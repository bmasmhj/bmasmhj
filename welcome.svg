<svg fill="none" viewBox="0 0 600 300" width="600" height="300" xmlns="http://www.w3.org/2000/svg">
    <foreignObject width="100%" height="100%">
    <body xmlns="http://www.w3.org/1999/xhtml">
    <style>
          * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              color: #344767;
              font-family: 'Alexandria', sans-serif;
  
          }
  
          .card {
              position: relative;
              display: flex;
              flex-direction: column;
              min-width: 0;
              word-wrap: break-word;
              background-color: hsl(0deg 0% 100% / 30%) !important;
              background-clip: border-box;
              border: 0 solid rgba(0, 0, 0, .125);
              border-radius: 1rem;
              padding: 3rem;
              margin-top: 3rem !important;
              justify-content: center !important;
              -webkit-backdrop-filter: saturate(200%) blur(30px);
              backdrop-filter: saturate(200%) blur(30px);
          }
  
          .lead {
              text-align: justify !important;
              font-size: 1rem;
              line-height: 1.625;
              font-weight: 400;
          }
  
          .shape-blob {
              background: #222641;
              width: 64px;
              height: 56px;
              border-radius: 30% 50% 20% 40%;
              animation: transform 10s ease-in-out infinite both alternate, movement_one 8s ease-in-out infinite both;
              opacity: .7;
              position: absolute;
              left: 78%;
              top: 59%;
          }
  
          .shape-blob.one {
              height: 100px;
              width: 104px;
              left: 10px;
              top: 10px;
              transform: rotate(-180deg);
              animation: transform 30s ease-in-out infinite both alternate, movement_two 60s ease-in-out infinite both;
          }
  
          .shape-blob.two {
              left: 80%;
              height: 100px;
              width: 100px;
              top: 11px;
              transform: rotate(-180deg);
              animation: transform 30s ease-in-out infinite both alternate, movement_two 60s ease-in-out infinite both;
          }
  
          .shape-blob.three {
              height: 197px;
              width: 168px;
              left: 11%;
              top: 31%;
              transform: rotate(-180deg);
              animation: transform 30s ease-in-out infinite both alternate, movement_two 60s ease-in-out infinite both;
          }
  
          .telivision {
              border: 10px solid #000;
          }
  
          .telivision-inside {
              border: 1px solid #a1a1a182;
  
          }
  
          .stand {
              margin-top: 5px;
              min-width: 50%;
              min-height: 10px;
              background: black;
              border-radius: 13px;
              border: 2px solid #767676;
          }
  
  
  
          @keyframes transform {
  
              0%,
              100% {
                  border-radius: 33% 67% 70% 30% / 30% 30% 70% 70%;
              }
  
              20% {
                  border-radius: 37% 63% 51% 49% / 37% 65% 35% 63%;
              }
  
              40% {
                  border-radius: 36% 64% 64% 36% / 64% 48% 52% 36%;
              }
  
              60% {
                  border-radius: 37% 63% 51% 49% / 30% 30% 70% 70%;
              }
  
              80% {
                  border-radius: 40% 60% 42% 58% / 41% 51% 49% 59%;
              }
          }
  
  
          @keyframes movement_one {
  
              0%,
              100% {
                  transform: none;
              }
  
              50% {
                  transform: translate(50%, 20%) rotateY(10deg) scale(1.2);
              }
          }
  
          @keyframes movement_two {
  
              0%,
              500% {
                  transform: none;
              }
  
              50% {
                  transform: translate(50%, 20%) rotate(-200deg) scale(1.2);
              }
          }
  
          a{
              text-decoration : none;
          }
  
          .btn{
              padding : 0.5rem 1rem;
              border-radius : 5px;
              color : white;
              font-weight : 600;
              cursor : pointer;
          }
  
          .bg-gradient-primary{
              background: linear-gradient(90deg, #141727 0%, #3a416f 100%);
          }
  
          .bg-gradient-success{
              background: linear-gradient(90deg, #fbcf33 0%, #f55f44 100%);
          }
  
      </style>
      <div style="display: flex; flex-direction : column; height : 100% ; padding-bottom : 50px; background-color : white ">
          <div>
              <div class="shape-blob "></div>
              <div class="shape-blob  one"></div>
              <div class="shape-blob three"></div>
              <div class="shape-blob two"></div>
          </div>
          <div
              style="width:90%;  margin:auto; display: flex; flex-direction : column; justify-content: center; align-items: center;">
              <div class="card" style=" box-shadow: 0 8px 26px -4px hsla(0, 0%, 8%, .15), 0 8px 9px -5px hsla(0, 0%, 8%, .06)">
                  <h1 style="margin-bottom: 0.5rem;">Bimash Maharjan</h1>
                  <h3 style="margin-bottom: 0.5rem;">Just a normal guy</h3>
                  <p class="lead"><q>If you only do what you can do, you'll never be better than what you are.</q></p>
              </div>
          </div>
       
      </div>
    </body>
    </foreignObject>
  </svg>
